version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: customer-feedbacks-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - customer-feedbacks-network
    restart: unless-stopped

  # Redis (Message Broker for Celery)
  redis:
    image: redis:7-alpine
    container_name: customer-feedbacks-redis
    ports:
      - "6379:6379"
    networks:
      - customer-feedbacks-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  customer-feedbacks-network:
    driver: bridge
